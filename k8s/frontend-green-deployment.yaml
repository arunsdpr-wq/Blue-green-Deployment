apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-green
  namespace: blue-green
  labels:
    app: frontend
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
      version: green
  template:
    metadata:
      labels:
        app: frontend
        version: green
    spec:
      containers:
      - name: frontend-green
        image: your-username/frontend-green:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3200
          name: http
        env:
        - name: PORT
          value: "3200"
        - name: BACKEND_URL
          value: "http://backend:5000"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3200
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3200
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
